[pytest]
markers =
    slow: mark a test as too long for quick assurance
    graphs: mark a test which generates graphs
    experimental: mark tests which should be considered separately
    implementation: mark a test which deals with implementation details, subject to change when implementation changes
log_format=%(levelname)s | %(name)s: %(message)s
testpaths =
    .
    ../stream
addopts = --doctest-modules
